name: CI

# Two triggers, two different questions.
#   pull_request — "is this change safe to merge?"  This is the run a branch
#                  ruleset names as a required status check.
#   push         — "is the branch actually green right now?"  On 2026-07-23 main
#                  sat broken for half an hour and nothing said so, because the
#                  catalog pins a TAG: a broken main cannot reach a request, so
#                  no request ever goes red to tell you. This trigger is the
#                  only thing that would have.
#
#                  develop is listed for the same reason and matters MORE: since
#                  the Gitflow move it is the default branch and where every
#                  feature lands, while main only changes at a release. A trigger
#                  scoped to main alone would watch the quiet branch and ignore
#                  the busy one.
# push is scoped to these two deliberately; unscoped, every branch push runs the
# suite twice — once for the push and once for the PR.
on:
    pull_request:
    push:
        branches: [main, develop]

# This job reads code and runs tests; it writes nothing. The default
# GITHUB_TOKEN scope depends on an org setting and is usually broader.
permissions:
    contents: read

jobs:
    # THE JOB NAME IS A CONTRACT. It is the literal string a branch ruleset
    # names in required_status_checks. Rename it and the ruleset keeps waiting
    # on a check that no longer reports — it never goes green and never goes
    # red. Same failure class as a control that leaves no trace (see D-005).
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7
            - name: setup node
              uses: actions/setup-node@v7
              with:
                node-version: 20
                cache: npm

            - name: install dependencies
              run: npm ci

            # `npm run build` is `tsc --noEmit`. On 2026-07-23 main did not
            # compile — this step is what catches that.
            - name: typecheck
              run: npm run build

            # Includes the POLICY:-prefixed assertions, which are the only
            # thing guarding the class-3 policy fence (private bucket, SSL-only,
            # encryption), and the cdk-nag compliance-gate suite.
            - name: test
              run: npm test
    # Proves the ENTRYPOINT still wires the compliance gate — which the jest test cannot,
    # because the test runs cdk-nag itself. Renders the same verdict panel as the platform's
    # scan job. Inputs are CI placeholders: this scans the block, not a real request.
    scan:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7
            - name: setup node
              uses: actions/setup-node@v7
              with:
                node-version: 20
                cache: npm
            - name: install dependencies
              run: npm ci

            # continue-on-error so a violation (synth exits 1) does not kill the job before
            # the panel renders. The verdict is derived from the report below, not from this
            # step's exit code — the report is the authority, as in the platform's scan.
            - name: synth via the block entrypoint
              continue-on-error: true
              run: |
                npx cdk synth -a "npx ts-node bin/s3.ts" \
                  -c account=111111111111 -c region=eu-west-1 -c companyId=up \
                  -c appId=ci00 -c env=dev -c blockRef=ci \
                  -c blockConfig='{"retain":false,"logBucket":"ci-log-bucket"}' \
                  -c tags='{}' \
                  1>/dev/null 2>synth.log

            - name: scan
              run: |
                REPORT="cdk.out/validation-report.json"
                LOG="synth.log"
                verdict="compliant"
                detail=""

                # 1. PROVABLE: a clean cdk-nag run writes `pluginReports: []`, so the block
                #    printing its own pack line is the only evidence the control executed.
                if [ ! -f "$LOG" ] || ! grep -q "^compliance: pack=" "$LOG"; then
                  verdict="not verified"
                  detail="No \`compliance: pack=\` line — cdk-nag is not registered in bin/s3.ts."
                # 2. EXISTS: absent report means the synth died before validation.
                elif [ ! -f "$REPORT" ]; then
                  verdict="not verified"
                  detail="No validation report — the synth did not reach validation."
                # 3. Any violation at any severity (cdk-nag v3 fails synth on warnings too).
                elif [ "$(jq '[.pluginReports[].violations[]] | length' "$REPORT")" -gt 0 ]; then
                  verdict="violations"
                  detail="$(jq -r '.pluginReports[].violations[] | "- `\(.ruleName)` [\(.severity)] — \(.description)"' "$REPORT")"
                fi

                {
                  echo "### Compliance scan"
                  echo ""
                  echo "| | |"
                  echo "|---|---|"
                  echo "| verdict | **$verdict** |"
                  echo "| block | \`s3\` |"
                  echo "| source | \`${GITHUB_REPOSITORY}@${GITHUB_SHA:0:7}\` |"
                  echo "| scan | block self-scan (CI placeholder inputs) |"
                  echo ""
                  echo "#### Rule pack"
                  echo ""
                  echo '```'
                  grep -h "^compliance: " "$LOG" 2>/dev/null || echo "none recorded"
                  echo '```'
                  echo ""
                  if [ -n "$detail" ]; then
                    echo "#### Findings"
                    echo ""
                    echo "$detail"
                    echo ""
                  fi
                  echo "#### Exceptions in force"
                  echo ""
                  if compgen -G "cdk.out/*.template.json" > /dev/null; then
                    jq -r '.Resources | to_entries[]
                           | select(.value.Metadata.cdk_nag)
                           | .value.Metadata.cdk_nag.rules_to_suppress[]
                           | "- `\(.id)` — \(.reason)"' cdk.out/*.template.json \
                      | sort -u | grep . || echo "- none"
                  else
                    echo "- no template emitted"
                  fi
                } >> "$GITHUB_STEP_SUMMARY"

                if [ "$verdict" != "compliant" ]; then
                  echo "::error::Compliance scan: $verdict"
                  exit 1
                fi
                echo "compliant — no violations, pack execution verified"
